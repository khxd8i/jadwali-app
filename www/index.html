<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>برنامجي الذكي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --math: #ef4444;
            --physics: #3b82f6;
            --chemistry: #eab308;
            --arabic: #f97316;
            --english: #8b5cf6;
            --french: #ec4899;
            --science: #06b6d4;
            --religion: #94a3b8;
            --quiz: #f43f5e;
            --rest: #10b981;
            --study: #6366f1;
            --break: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        html, body { height: 100%; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            padding-bottom: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية الإيموجيات النازلة باستمرار حسب الوقت الحالي */
        #ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .falling-emoji {
            position: absolute;
            top: -40px;
            font-size: 1.8rem;
            opacity: 0.16;
            line-height: 1;
            animation-name: fallDown;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            will-change: transform;
        }
        @keyframes fallDown {
            from { transform: translateY(0); }
            to { transform: translateY(115vh); }
        }
        @keyframes fallDownBox {
            from { transform: translateY(0); }
            to { transform: translateY(160%); }
        }

        .header, .tabs, .timeline { position: relative; z-index: 1; }

        .header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .clock { font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .current-task { margin-top: 10px; font-size: 1.2rem; background: var(--rest); padding: 5px 15px; border-radius: 20px; display: inline-block; font-weight: bold; }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 10px 25px;
            border-radius: 25px;
            background: var(--card-bg);
            color: #94a3b8;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }
        .tab.active { background: #fff; color: var(--bg-dark); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .timeline { padding: 15px; }
        .event {
            position: relative;
            display: flex;
            margin-bottom: 15px;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .event-emoji-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .box-falling-emoji {
            position: absolute;
            top: -20px;
            font-size: 1.3rem;
            opacity: 0.22;
            line-height: 1;
            animation-name: fallDownBox;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }

        .time-col {
            position: relative;
            z-index: 1;
            padding: 15px 10px;
            background: rgba(0,0,0,0.2);
            text-align: center;
            width: 80px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 4px solid;
        }
        .details-col { position: relative; z-index: 1; padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .event-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .event-desc { font-size: 0.85rem; color: #cbd5e1; }

        .mini-break {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -5px 0 10px 0;
            color: var(--break);
            font-size: 0.8rem;
            font-weight: bold;
        }
        .mini-break::before, .mini-break::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--break);
            margin: 0 10px;
        }

        /* قسم التذكيرات الإضافية */
        .reminders-section {
            position: relative;
            z-index: 1;
            margin: 15px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .reminders-section h3 { margin-bottom: 10px; font-size: 1rem; }
        .reminder-form { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .reminder-form input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            padding: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .reminder-form input[type="text"] { flex: 1; min-width: 120px; }
        .reminder-form button, .notif-btn {
            background: var(--study);
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 8px 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .reminder-item button {
            background: var(--math);
            border: none;
            border-radius: 6px;
            color: #fff;
            padding: 4px 8px;
            cursor: pointer;
        }
        .notif-status { font-size: 0.75rem; color: #94a3b8; margin-top: 6px; }

        #toast-container {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: toastIn 0.25s ease, toastOut 0.4s ease 3.6s forwards;
            max-width: 85vw;
            text-align: center;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-10px);} }
    </style>
</head>
<body>

    <div id="ambient-bg"></div>

    function renderTabs() {
        const tabsContainer = document.getElementById('tabs');
        tabsContainer.innerHTML = '';
        const reorderedDays = ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];

        reorderedDays.forEach(day => {
            const div = document.createElement('div');
            div.className = `tab ${day === currentSelectedDay ? 'active' : ''}`;
            div.innerText = day;
            div.onclick = () => { currentSelectedDay = day; renderTabs(); renderTimeline(); };
            tabsContainer.appendChild(div);
        });
    }

    function randomChar(emojiString) {
        const chars = Array.from(emojiString);
        return chars[Math.floor(Math.random() * chars.length)];
    }

    // ينزّل إيموجي واحد من فوق الحاوية للأسفل، وبينشال حاله لما يخلص
    const recentPositions = new WeakMap();

    // يختار موقع أفقي بعيد شوي عن آخر كم إيموجي نزلوا بنفس الحاوية، منعاً للتكدس فوق بعض
    function pickLeftPosition(container, spread) {
        const recents = recentPositions.get(container) || [];
        let candidate = Math.random() * spread;
        for (let i = 0; i < 6; i++) {
            candidate = Math.random() * spread;
            if (recents.every(p => Math.abs(p - candidate) > spread * 0.16)) break;
        }
        recents.push(candidate);
        if (recents.length > 5) recents.shift();
        recentPositions.set(container, recents);
        return candidate;
    }

    function spawnFallingEmoji(container, emojiString, className, animName, duration, spread = 90) {
        const el = document.createElement('span');
        el.className = className;
        el.textContent = randomChar(emojiString);
        el.style.left = pickLeftPosition(container, spread) + '%';
        el.style.animationDuration = duration + 's';
        el.style.fontSize = (1 + Math.random() * 0.9) + 'rem';
        el.style.opacity = (0.09 + Math.random() * 0.11).toFixed(2);
        el.style.animationName = animName;
        el.addEventListener('animationend', () => el.remove());
        container.appendChild(el);
    }

    function renderTimeline() {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        const dayEvents = scheduleData[currentSelectedDay];

        dayEvents.forEach((item, idx) => {
            if (item.break) {
                timeline.innerHTML += `<div class="mini-break">${item.break}</div>`;
            } else {
                const meta = subjectMeta[item.type] || subjectMeta.rest;
                const eventId = `${currentSelectedDay}-${idx}`;
                timeline.innerHTML += `
                    <div class="event" id="ev-${eventId}" data-type="${item.type}" style="border-left-color: ${meta.color}" onclick="burstBoxEmojis('${eventId}')">
                        <div class="event-emoji-layer" id="layer-${eventId}"></div>
                        <div class="time-col" style="background: ${meta.color}22; color: ${meta.color}">
                            <span>${item.start}</span>
                            <span style="font-size:0.7rem; margin: 2px 0;">إلى</span>
                            <span>${item.end}</span>
                        </div>
                        <div class="details-col">
                            <div class="event-title" style="color: ${meta.color}">${item.title}</div>
                            <div class="event-desc">${item.desc}</div>
                        </div>
                    </div>
                `;
            }
        });
    }

    // لما تضغط على مربع: تنزل إيموجياته جوا حدود المربع بس لمدة ثانية ونص وبتوقف
    function burstBoxEmojis(eventId) {
        const layer = document.getElementById(`layer-${eventId}`);
        const box = document.getElementById(`ev-${eventId}`);
        if (!layer || !box) return;
        const type = box.getAttribute('data-type');
        const meta = subjectMeta[type] || subjectMeta.rest;

        const burstInterval = setInterval(() => {
            spawnFallingEmoji(layer, meta.emoji, 'box-falling-emoji', 'fallDownBox', 1 + Math.random() * 0.6, 85);
        }, 160);

        setTimeout(() => clearInterval(burstInterval), 1300);
    }

    // خلفية مستمرة: بتنزل إيموجيات الوقت الحالي باستمرار
    let ambientInterval = null;
    let lastAmbientType = null;
    let lastActiveTitle = null;

    function renderAmbient(type) {
        const meta = subjectMeta[type] || subjectMeta.rest;
        const ambient = document.getElementById('ambient-bg');

        if (ambientInterval) clearInterval(ambientInterval);
        ambient.innerHTML = '';

        ambientInterval = setInterval(() => {
            spawnFallingEmoji(ambient, meta.emoji, 'falling-emoji', 'fallDown', 8 + Math.random() * 6, 92);
        }, 600);
    }

    function formatRemaining(mins) {
        mins = Math.max(0, Math.round(mins));
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        if (h > 0 && m > 0) return `باقي ${h} ساعة و ${m} دقيقة`;
        if (h > 0) return `باقي ${h} ساعة`;
        return `باقي ${m} دقيقة`;
    }

    function updateLiveStatus() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ar-EG', { hour12: true, hour: '2-digit', minute: '2-digit' });

        const currentDayName = days[now.getDay()];
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        let foundTask = false;
        let activeType = 'sleep';
        let currentTitle = null;

        if (scheduleData[currentDayName]) {
            for (let item of scheduleData[currentDayName]) {
                if (!item.break) {
                    let startParts = item.start.split(':');
                    let endParts = item.end.split(':');
                    let startMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);
                    let endMin = parseInt(endParts[0]) * 60 + parseInt(endParts[1]);

                    if (endMin === 0) endMin = 24 * 60;

                    if (currentMinutes >= startMin && currentMinutes < endMin) {
                        const meta = subjectMeta[item.type] || subjectMeta.rest;
                        document.getElementById('current-task').innerText = item.title;
                        document.getElementById('current-task').style.background = meta.color;
                        document.getElementById('time-left').innerText =
                            `ينتهي الساعة ${item.end} · ${formatRemaining(endMin - currentMinutes)}`;
                        activeType = item.type;
                        currentTitle = item.title;
                        foundTask = true;
                        break;
                    }
                }
            }
        }

        if (!foundTask) {
            document.getElementById('current-task').innerText = "خارج وقت الجدول / نوم 😴";
            document.getElementById('current-task').style.background = "var(--rest)";
            activeType = 'sleep';
            currentTitle = 'خارج وقت الجدول / نوم';

            const todaysEvents = (scheduleData[currentDayName] || []).filter(e => !e.break);
            if (todaysEvents.length > 0) {
                const [fh, fm] = todaysEvents[0].start.split(':').map(Number);
                let nextStartMin = fh * 60 + fm;
                let remain = nextStartMin - currentMinutes;
                if (remain < 0) remain += 24 * 60;
                document.getElementById('time-left').innerText =
                    `يبدأ الجدول الساعة ${todaysEvents[0].start} · ${formatRemaining(remain)}`;
            } else {
                document.getElementById('time-left').innerText = "";
            }
        }

        // تنبيه تلقائي عند انتقال الجدول من حصة/فترة لحصة تانية
        if (lastActiveTitle !== null && currentTitle !== lastActiveTitle) {
            fireAlert('⏰ تبديل الوقت', `خلص: ${lastActiveTitle} - بدأ: ${currentTitle}`);
        }
        lastActiveTitle = currentTitle;

        if (activeType !== lastAmbientType) {
            renderAmbient(activeType);
            lastAmbientType = activeType;
        }

        checkReminders(now);
    }

    // ===== التذكيرات الخاصة (تُحفظ محلياً بدون إنترنت) =====
    function loadReminders() {
        try {
            const raw = localStorage.getItem('myReminders');
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }

    function saveReminders(list) {
        try {
            localStorage.setItem('myReminders', JSON.stringify(list));
        } catch (e) { /* تجاهل إن تعذر الحفظ */ }
    }

    function renderReminders() {
        const list = loadReminders();
        const container = document.getElementById('reminders-list');
        container.innerHTML = '';
        list.forEach((r, i) => {
            const label = r.time ? `⏰ ${r.time} - ${r.text}` : `📝 ${r.text}`;
            container.innerHTML += `
                <div class="reminder-item">
                    <span>${label}</span>
                    <button onclick="deleteReminder(${i})">حذف</button>
                </div>
            `;
        });
    }

    // الوقت صار اختياري: لو فاضي، بتنحفظ كملاحظة/تذكير عادي بدون أي تنبيه
    function addReminder() {
        const time = document.getElementById('reminder-time').value;
        const text = document.getElementById('reminder-text').value.trim();
        if (!text) return;
        const list = loadReminders();
        list.push({ time: time || null, text, firedToday: null });
        saveReminders(list);
        document.getElementById('reminder-time').value = '';
        document.getElementById('reminder-text').value = '';
        renderReminders();
    }

    function deleteReminder(index) {
        const list = loadReminders();
        list.splice(index, 1);
        saveReminders(list);
        renderReminders();
    }

    function checkReminders(now) {
        const hhmm = now.toTimeString().slice(0, 5);
        const todayStr = now.toDateString();
        const list = loadReminders();
        let changed = false;
        list.forEach(r => {
            if (r.time && r.time === hhmm && r.firedToday !== todayStr) {
                r.firedToday = todayStr;
                changed = true;
                fireAlert('🔔 تذكير', r.text);
            }
        });
        if (changed) saveReminders(list);
    }

    // ===== تنبيه موحّد: توست داخل الصفحة + اهتزاز + إشعار نظام لو مسموح =====
    function showToast(message) {
        const container = document.getElementById('toast-container');
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = message;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4200);
    }

    function fireAlert(title, body) {
        // التوست شغال دايمًا مهما كانت حالة صلاحية الإشعارات
        showToast(`${title}: ${body}`);
        if (navigator.vibrate) navigator.vibrate([120, 60, 120]);

        // لو التطبيق متغلف عبر Capacitor (APK): إشعار نظام حقيقي offline كامل
        const capLN = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications;
        if (capLN) {
            capLN.schedule({
                notifications: [{
                    title, body,
                    id: Math.floor(Math.random() * 1000000),
                    schedule: { at: new Date(Date.now() + 500) }
                }]
            }).catch(() => {});
            return;
        }

        // إشعار متصفح عادي (يشتغل بس لو الصفحة https، مش file://)
        if ('Notification' in window && Notification.permission === 'granted') {
            try { new Notification(title, { body }); } catch (e) { /* بعض المتصفحات بترفض من file:// حتى لو الصلاحية ممنوحة */ }
        }
    }

    function requestNotifPermission() {
        const status = document.getElementById('notif-status');
        if (!('Notification' in window)) {
            status.innerText = 'المتصفح لا يدعم إشعارات النظام هون، بس التنبيه جوا الصفحة (توست + اهتزاز) شغال طبيعي';
            return;
        }
        if (Notification.permission === 'denied') {
            status.innerText = 'الإشعارات ممنوعة من إعدادات الموقع نفسه، أو لأن الملف مفتوح محلي (file://) وما فيه https - جرب ترفع الملف على استضافة وافتحه من رابط https. بالحالتين التنبيه جوا الصفحة رح يضل شغال.';
            return;
        }
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                status.innerText = 'الإشعارات مفعّلة ✅ (وبتضل التنبيهات جوا الصفحة شغالة كمان كنسخة احتياطية)';
            } else {
                status.innerText = 'تم رفض إشعارات النظام، بس التنبيه جوا الصفحة (توست + اهتزاز) رح يضل يشتغل عند كل حصة وتذكير.';
            }
        });
    }

    // Init
    renderTabs();
    renderTimeline();
    renderReminders();
    setInterval(updateLiveStatus, 1000);
    updateLiveStatus();

    // لو التطبيق شغال جوا غلاف Capacitor: اطلب صلاحية الإشعارات المحلية تلقائيًا
    (function initCapacitorNotifications() {
        const capLN = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications;
        if (capLN && capLN.requestPermissions) {
            capLN.requestPermissions().catch(() => {});
        }
    })();
</script>
